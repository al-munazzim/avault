name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: python-${{ matrix.python-version }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install --no-cache-dir nostr-sdk pytest qrcode

      - name: Run tests
        run: |
          cd scripts
          python -m pytest test_avault.py -v --tb=short

      - name: Syntax check
        run: python -m py_compile scripts/avault.py
