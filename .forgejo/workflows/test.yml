name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: docker
    container:
      image: python:3.13-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --no-cache-dir nostr-sdk pytest qrcode

      - name: Run tests
        run: |
          cd scripts
          python -m pytest test_avault.py -v --tb=short

      - name: Lint check (syntax)
        run: |
          python -m py_compile scripts/avault.py
          echo "✅ Syntax OK"
