name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install --no-cache-dir nostr-sdk pytest qrcode

      - name: Run tests
        run: |
          cd scripts
          python -m pytest test_avault.py -v --tb=short

      - name: Syntax check
        run: python -m py_compile scripts/avault.py
